<!DOCTYPE html>
<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Responsive Category Manager</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary-warm: #B91C1C;
            --primary-warm-hover: #991B1B;
            --accent-warm: #EAB308;
            --accent-warm-hover: #CA8A04;
            --cream-bg: #FFFDF0;
            --cream-content: #FFFFFF;
            --danger-warm: #DC2626;
            --text-main: #451A03;
        }
        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #E7E5E4;
            border-radius: 10px;
        }
        .ios-bottom-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center sm:p-6 lg:p-8">
<div class="w-full h-full sm:h-auto sm:max-h-[90vh] sm:max-w-2xl lg:max-w-3xl bg-[var(--cream-bg)] sm:rounded-[40px] shadow-2xl overflow-hidden flex flex-col border border-orange-100 transition-all duration-300">
<header class="bg-[var(--primary-warm)] px-6 py-5 sm:py-7 flex items-center justify-between text-white shadow-lg shrink-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-2xl sm:text-3xl">category</span>
<h1 class="text-xl sm:text-2xl font-bold tracking-tight">분류 등록/수정</h1>
</div>
<button class="bg-white/15 hover:bg-white/25 active:scale-95 transition-all p-3 rounded-2xl flex items-center gap-2 text-sm font-semibold backdrop-blur-md border border-white/10">
<span class="material-symbols-outlined text-xl">keyboard</span>
<span class="hidden sm:inline">화상키보드</span>
</button>
</header>
<main class="flex-1 overflow-hidden flex flex-col p-4 sm:p-6 gap-4 sm:gap-6">
<div class="flex-1 bg-white rounded-[24px] sm:rounded-[32px] border border-orange-100 overflow-hidden flex flex-col shadow-sm relative group">
<div class="grid grid-cols-[70px_1fr_100px] bg-orange-50/60 border-b border-orange-100 sticky top-0 z-20">
<div class="py-4 text-center text-xs font-bold text-orange-800/60 uppercase tracking-widest">순번</div>
<div class="py-4 pl-4 text-left text-xs font-bold text-orange-800/60 uppercase tracking-widest">분류 명칭</div>
<div class="py-4 text-center text-xs font-bold text-orange-800/60 uppercase tracking-widest">상태</div>
</div>
<div class="flex-1 overflow-y-auto custom-scrollbar">
<div class="grid grid-cols-[70px_1fr_100px] border-b border-orange-50 bg-orange-100/50 cursor-pointer hover:bg-orange-100/30 transition-colors group/row">
<div class="py-6 text-center font-bold text-[var(--primary-warm)] text-lg">1</div>
<div class="py-6 pl-4 font-bold text-[var(--text-main)] text-lg flex items-center">라면</div>
<div class="py-6 flex justify-center items-center">
<span class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></span>
</div>
</div>
<div class="grid grid-cols-[70px_1fr_100px] border-b border-orange-50 cursor-pointer hover:bg-orange-50 transition-colors">
<div class="py-6 text-center font-medium text-stone-400 text-lg">2</div>
<div class="py-6 pl-4 font-semibold text-stone-700 text-lg flex items-center">음료</div>
<div class="py-6 flex justify-center items-center">
<span class="w-2.5 h-2.5 rounded-full bg-stone-200"></span>
</div>
</div>
<div class="grid grid-cols-[70px_1fr_100px] border-b border-orange-50/30 opacity-20">
<div class="py-6"></div><div class="py-6"></div><div class="py-6"></div>
</div>
<div class="grid grid-cols-[70px_1fr_100px] border-b border-orange-50/30 opacity-10">
<div class="py-6"></div><div class="py-6"></div><div class="py-6"></div>
</div>
</div>
<div class="absolute right-4 bottom-4 flex flex-col gap-3">
<button class="w-14 h-14 sm:w-16 sm:h-16 bg-white shadow-xl rounded-2xl flex items-center justify-center text-orange-800 border border-orange-100 active:scale-90 hover:bg-orange-50 transition-all">
<span class="material-symbols-outlined font-bold text-2xl">arrow_upward</span>
</button>
<button class="w-14 h-14 sm:w-16 sm:h-16 bg-white shadow-xl rounded-2xl flex items-center justify-center text-orange-800 border border-orange-100 active:scale-90 hover:bg-orange-50 transition-all">
<span class="material-symbols-outlined font-bold text-2xl">arrow_downward</span>
</button>
</div>
</div>
<div class="space-y-4 sm:space-y-6">
<div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-6 bg-orange-100/30 p-4 rounded-2xl border border-orange-100">
<label class="text-sm sm:text-base font-bold text-orange-900/80 whitespace-nowrap px-1">분류명 관리</label>
<div class="relative flex-1">
<input class="w-full bg-white border-orange-200 rounded-xl px-5 py-4 text-lg text-[var(--text-main)] font-semibold focus:ring-4 focus:ring-orange-200 focus:border-[var(--primary-warm)] transition-all shadow-inner" placeholder="카테고리 이름을 입력하세요" type="text" value="라면"/>
</div>
</div>
<div class="grid grid-cols-3 gap-3 sm:gap-4">
<button class="bg-[var(--primary-warm)] hover:bg-[var(--primary-warm-hover)] text-white py-5 sm:py-6 rounded-2xl font-bold text-sm sm:text-base shadow-lg shadow-red-900/10 active:scale-95 transition-all flex flex-col items-center justify-center gap-2">
<span class="material-symbols-outlined text-2xl sm:text-3xl">add_circle</span>
<span>신규등록</span>
</button>
<button class="bg-[var(--accent-warm)] hover:bg-[var(--accent-warm-hover)] text-orange-950 py-5 sm:py-6 rounded-2xl font-bold text-sm sm:text-base shadow-lg shadow-yellow-900/10 active:scale-95 transition-all flex flex-col items-center justify-center gap-2">
<span class="material-symbols-outlined text-2xl sm:text-3xl">edit_note</span>
<span>수정하기</span>
</button>
<button class="bg-stone-200 hover:bg-stone-300 text-stone-700 py-5 sm:py-6 rounded-2xl font-bold text-sm sm:text-base shadow-lg active:scale-95 transition-all flex flex-col items-center justify-center gap-2 border border-stone-300/50">
<span class="material-symbols-outlined text-2xl sm:text-3xl">delete_sweep</span>
<span>삭제</span>
</button>
</div>
</div>
</main>
<footer class="p-4 sm:p-6 bg-white border-t border-orange-50 flex justify-center ios-bottom-safe">
<button class="w-full max-w-md bg-stone-800 hover:bg-black text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">
                설정 닫기
            </button>
</footer>
</div>
<div class="fixed inset-0 -z-10 opacity-40 pointer-events-none overflow-hidden bg-[#F5F5F4]">
<div class="absolute -top-24 -left-24 w-[40vw] h-[40vw] min-w-[300px] bg-orange-200 rounded-full blur-[100px] animate-pulse"></div>
<div class="absolute bottom-0 right-0 w-[50vw] h-[50vw] min-w-[400px] bg-red-100 rounded-full blur-[120px]"></div>
</div>

</body></html>
