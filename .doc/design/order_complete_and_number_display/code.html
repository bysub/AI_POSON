<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Complete</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f42525",
                        "background-light": "#f8f5f5",
                        "background-dark": "#221010",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#1c0d0d] dark:text-white transition-colors duration-300">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- TopAppBar Replacement -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-primary flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-4xl font-bold">check_circle</span>
</div>
<h2 class="text-[#1c0d0d] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12 font-display">Order Complete</h2>
</div>
<div class="flex flex-col flex-1 justify-center items-center px-6">
<!-- HeadlineText Replacement -->
<div class="bg-primary/10 dark:bg-primary/20 rounded-xl px-8 py-6 mb-6">
<h1 class="text-primary tracking-tight text-[56px] font-extrabold leading-tight text-center font-display">#125</h1>
<p class="text-primary text-sm font-bold uppercase tracking-widest text-center mt-1">Your Order Number</p>
</div>
<!-- BodyText Replacement -->
<div class="max-w-xs">
<p class="text-[#1c0d0d] dark:text-white/90 text-xl font-semibold leading-relaxed pb-3 pt-1 text-center font-display">
                    Thank you for your order!
                </p>
<p class="text-[#1c0d0d]/70 dark:text-white/60 text-base font-normal leading-normal pb-8 text-center font-display">
                    Please take your receipt from the printer below.
                </p>
</div>
<!-- Visual Illustration (Images Component modified) -->
<div class="flex w-full max-w-xs justify-center mb-10">
<div class="relative w-48 h-48 bg-primary/5 dark:bg-white/5 rounded-full flex items-center justify-center border-2 border-dashed border-primary/30">
<span class="material-symbols-outlined text-primary text-[80px]">receipt_long</span>
<!-- Decorative element for printing action -->
<div class="absolute -bottom-2 bg-white dark:bg-background-dark px-4 py-1 rounded-full border border-primary/20 shadow-sm">
<span class="text-primary font-bold text-xs uppercase tracking-tighter">Printing...</span>
</div>
</div>
</div>
</div>
<!-- Footer Button (SingleButton Replacement) -->
<div class="mt-auto pb-10 px-6">
<div class="flex flex-col gap-4">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-5 bg-primary text-white text-lg font-bold leading-normal tracking-[0.015em] shadow-lg shadow-primary/20 active:scale-95 transition-transform font-display">
<span class="truncate">Return to Home</span>
</button>
<p class="text-[#1c0d0d]/40 dark:text-white/30 text-xs text-center font-medium">
                    This screen will automatically reset in 30 seconds
                </p>
</div>
</div>
<!-- Bottom spacing -->
<div class="h-2 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
